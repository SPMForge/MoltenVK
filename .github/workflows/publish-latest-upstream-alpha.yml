name: Publish Latest Upstream Alpha

run-name: Latest upstream alpha publish

on:
  schedule:
    - cron: "19 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-latest-upstream-alpha
  cancel-in-progress: false

jobs:
  release:
    name: Publish alpha release
    uses: ./.github/workflows/publish-package-release-core.yml
    with:
      selection_mode: latest
      release_channel: alpha
      publish_to_default_branch: false
    secrets: inherit
