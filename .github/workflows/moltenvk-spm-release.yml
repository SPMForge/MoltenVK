name: MoltenVK Swift Package Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  semantic-release:
    runs-on: macos-14
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: SwiftPackage/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release dependencies
        run: npm ci --prefix SwiftPackage

      - name: Verify release layout
        run: ./tests/verify_swift_package_integration.sh

      - name: Publish semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --prefix SwiftPackage semantic-release --extends ./SwiftPackage/release.config.cjs
