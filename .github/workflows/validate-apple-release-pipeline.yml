name: Validate Apple Release Pipeline

run-name: Validate pipeline for ${{ github.event_name == 'pull_request' && format('PR {0}', github.event.pull_request.number) || github.ref_name }}

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Optional stable upstream tag to validate instead of the latest upstream stable release
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: validate-apple-release-pipeline-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate release pipeline
    runs-on: macos-15
    env:
      MVK_ENABLE_CCACHE: "1"
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure ccache
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --version | head -n 1
            exit 0
          fi
          brew install ccache
          ccache --version | head -n 1

      - name: Require Swift 6 toolchain
        run: |
          swift --version
          swift --version | grep -Eq '(Apple Swift version|Swift version) ([6-9]|[1-9][0-9])\.' || {
            echo "error: Swift 6.0 or newer is required for Package.swift" >&2
            exit 1
          }

      - name: Resolve upstream ref for validation
        id: upstream
        run: |
          source ./Scripts/SwiftPackage/source_acquisition.sh
          if [[ -n "${{ inputs.upstream_ref }}" ]]; then
            resolved_ref="$(resolve_requested_or_latest_upstream_ref "${{ inputs.upstream_ref }}")"
          else
            resolved_ref="$(resolve_latest_upstream_ref)"
          fi
          echo "ref=${resolved_ref}" >> "$GITHUB_OUTPUT"
          echo "Resolved upstream ref: ${resolved_ref}"

      - name: Preflight Apple platforms
        env:
          MVK_UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
        run: ./Scripts/SwiftPackage/preflight_apple_platforms.sh

      - name: Prep cache key
        id: prep
        env:
          RESOLVED_UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
        run: |
          xcode_version="$(xcodebuild -version | tr '\t\r\n ' '_')"
          upstream_tree_ref="refs/upstream-tags/${RESOLVED_UPSTREAM_REF}"
          upstream_inputs_hash="$(
            git ls-tree -r "${upstream_tree_ref}" -- \
              ExternalRevisions \
              Templates/spirv-tools/build.zip \
              fetchDependencies \
            | shasum -a 256 \
            | awk '{print $1}'
          )"
          dependency_cache_inputs_hash="$(
            git ls-files --stage -- \
              'Scripts/SwiftPackage/build_swift_package_dependencies.sh' \
              'Scripts/SwiftPackage/common.sh' \
              'Scripts/SwiftPackage/source_acquisition.sh' \
            | shasum -a 256 \
            | awk '{print $1}'
          )"
          compiler_cache_inputs_hash="$(
            git ls-files --stage -- \
              'Scripts/SwiftPackage/build_swift_package.sh' \
              'Scripts/SwiftPackage/common.sh' \
              'Scripts/SwiftPackage/materialize_public_headers.py' \
              'Scripts/SwiftPackage/source_acquisition.sh' \
            | shasum -a 256 \
            | awk '{print $1}'
          )"
          echo "xcode_version=${xcode_version}" >> "$GITHUB_OUTPUT"
          echo "upstream_inputs_hash=${upstream_inputs_hash}" >> "$GITHUB_OUTPUT"
          echo "dependency_cache_inputs_hash=${dependency_cache_inputs_hash}" >> "$GITHUB_OUTPUT"
          echo "compiler_cache_inputs_hash=${compiler_cache_inputs_hash}" >> "$GITHUB_OUTPUT"

      - name: Cache compiler results
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ steps.prep.outputs.xcode_version }}-${{ steps.upstream.outputs.ref }}-${{ steps.prep.outputs.compiler_cache_inputs_hash }}-v2
          restore-keys: |
            ccache-${{ runner.os }}-${{ steps.prep.outputs.xcode_version }}-${{ steps.upstream.outputs.ref }}-
            ccache-${{ runner.os }}-${{ steps.prep.outputs.xcode_version }}-

      - name: Cache MoltenVK external dependencies
        id: cache-dependencies
        uses: actions/cache@v4
        with:
          path: |
            External/cereal
            External/Vulkan-Headers
            External/SPIRV-Cross
            External/SPIRV-Tools
            External/Vulkan-Tools
            External/Volk
            External/build
            !External/build/Intermediates
          key: dependencies-${{ runner.os }}-${{ steps.prep.outputs.xcode_version }}-${{ steps.upstream.outputs.ref }}-${{ steps.prep.outputs.upstream_inputs_hash }}-${{ steps.prep.outputs.dependency_cache_inputs_hash }}-v2

      - name: Verify release layout
        run: ./tests/verify_swift_package_integration.sh

      - name: Prewarm MoltenVK dependencies
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        env:
          MVK_UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
        run: ./Scripts/SwiftPackage/build_swift_package_dependencies.sh

      - name: Build Swift Package artifacts
        env:
          SKIP_DEPENDENCY_FETCH: "1"
          MVK_UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
        run: ./Scripts/SwiftPackage/build_swift_package.sh

      - name: Validate Swift Package manifest
        run: swift package dump-package >/dev/null

      - name: Verify generated package assets
        run: ./tests/verify_swift_package_artifacts.sh

      - name: Verify consumer smoke tests
        run: ./tests/verify_swift_package_consumer.sh

      - name: Show ccache statistics
        if: always()
        run: ./Scripts/SwiftPackage/report_ccache_stats.sh "Validate ccache statistics"

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moltenvk-validation-${{ github.run_id }}
          path: |
            Artifacts/*.zip
            Artifacts/*.checksum
            Artifacts/MoltenVK.xcframework
            Artifacts/MoltenVK-static.xcframework
          if-no-files-found: ignore
